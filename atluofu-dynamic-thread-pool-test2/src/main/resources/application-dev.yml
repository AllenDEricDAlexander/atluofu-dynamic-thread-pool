server:
  port: 8094

# 线程池配置
thread:
  pool:
    executor:
      config:
        core-pool-size: 15
        max-pool-size: 40
        keep-alive-time: 5000
        block-queue-size: 3000
        policy: CallerRunsPolicy

# 动态线程池管理配置
dynamic:
  thread:
    pool:
      config:
        # 状态；true = 开启、false 关闭
        enable: true
        # redis host
        host: 127.0.0.1
        # redis port
        port: 6379
        # redis password
        password: HomeLab666

# 日志
logging:
  level:
    root: info
  config: classpath:logback-spring.xml
